name: Publish Website

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      SENTHIL_LEARN_TO_SOLVE_IT_TOKEN: ${{ secrets.SENTHIL_LEARN_TO_SOLVE_IT_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Node dependencies
        run: npm install

      - name: Build site
        run: |
          for attempt in 1 2 3; do
            nikola build && break
            if [ $attempt -lt 3 ]; then
              echo "Build attempt $attempt failed, retrying in 60s..."
              sleep 60
            else
              echo "Build failed after 3 attempts"
              exit 1
            fi
          done

      - name: Commit updated Wikipedia cache
        run: |
          git config user.name "Senthil Kumaran"
          git config user.email "orsenthil@gmail.com"
          git add cache/wikipedia_cache.json
          git diff --cached --quiet || (git commit -m "Update Wikipedia cache" && git push)

      - name: Deploy site
        run: cd output && npx surfer put --token "$SENTHIL_LEARN_TO_SOLVE_IT_TOKEN" --server senthil.learntosolveit.com * /
